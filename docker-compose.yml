version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: restaurant_db
    networks:
      - restaurant-network

  backend:
    build: ./backend
    container_name: restaurant_backend
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    networks:
      - restaurant-network
    environment:
      SPRING_MONGODB_URI: mongodb://mongodb:27017/restaurant_db
      APP_JWT_SECRET: ZGV2LWxvY2FsLWp3dC1zZWNyZXQtMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMg==
      APP_QR_SECRET: ZGV2LWxvY2FsLXFyLXNlY3JldC0xMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==
      APP_AUTH_SETUP_KEY: local-setup-key
      APP_AUTH_ALLOW_PUBLIC_REGISTRATION: "true"
    entrypoint: ["sh", "-c", "echo $$SPRING_MONGODB_URI && java -jar app.jar"]

  frontend:
    build: ./react
    container_name: restaurant_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - restaurant-network

volumes:
  mongo-data:

networks:
  restaurant-network:
