spring.application.name=menu
# Spring Boot 4 canonical key is spring.mongodb.uri.
spring.mongodb.uri=${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/restaurant_db}}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Public order rate limiting
app.ratelimit.public-orders.max-requests-per-window=60
app.ratelimit.public-orders.window-seconds=60
app.ratelimit.redis-enabled=${APP_RATELIMIT_REDIS_ENABLED:false}
app.ratelimit.redis-key-prefix=${APP_RATELIMIT_REDIS_KEY_PREFIX:ratelimit:public-orders}

# Local dev defaults (override via env vars in docker/prod).
app.jwt.secret=${APP_JWT_SECRET:ZGV2LWxvY2FsLWp3dC1zZWNyZXQtMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMg==}
app.qr.secret=${APP_QR_SECRET:ZGV2LWxvY2FsLXFyLXNlY3JldC0xMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMw==}
app.auth.setup-key=${APP_AUTH_SETUP_KEY:local-setup-key}
app.auth.allow-public-registration=${APP_AUTH_ALLOW_PUBLIC_REGISTRATION:true}

# Forecasting ML integration
app.forecast.ml.enabled=${APP_FORECAST_ML_ENABLED:false}
app.forecast.ml.url=${APP_FORECAST_ML_URL:}
